<!DOCTYPE html>
<html>
<head>
  <title>KOLEKSI BORANG</title>
</head>
<body style="background-color: lightblue">

  <center>

    <h2>USER FORM</h2>

    <form action="koleksi.php" method="get">

      <table>
        <tr>
          <td>FIRST NAME</td>
          <td><input type="text" name="firstname"></td>
        </tr>
        <tr>
          <td>PASSWORD</td>
          <td><input type="password" name="password"></td>
        </tr>
        <tr>
          <td>GENDER</td>
          <td>
            <input type="radio" name="gender" value="male"> Male
            <input type="radio" name="gender" value="female"> Female
          </td>
        </tr>
        <tr>
          <td>ADDRESS</td>
          <td><textarea name="address" rows="4" cols="30"></textarea></td>
        </tr>
        <tr>
          <td>D.O.B</td>
          <td>
            <select name="month">
              <option>Jan</option>
              <option>Feb</option>
              <option>Mar</option>
            </select>
            <select name="day">
              <option>1</option>
              <option>2</option>
            </select>
            <select name="year">
              <option>1990</option>
              <option>1991</option>
            </select>
          </td>
        </tr>
        <tr>
          <td>SELECT GAMES</td>
          <td>
            <input type="checkbox" name="games" value="hockey"> Hockey
            <input type="checkbox" name="games" value="football"> Football
            <input type="checkbox" name="games" value="cricket"> Cricket
            <input type="checkbox" name="games" value="volleyball"> VolleyBall
          </td>
        </tr>
        <tr>
          <td>MARITAL STATUS</td>
          <td>
            <input type="radio" name="marital" value="married"> Married
            <input type="radio" name="marital" value="unmarried"> Unmarried
          </td>
        </tr>
        <tr>
          <td colspan="2" align="center">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
            <button type="button" onclick="window.location.href='index.html'">Back</button>
          </td>
        </tr>
        <tr>
          <td colspan="2" align="center">
            <input type="checkbox" name="agreement"> I accept this agreement
          </td>
        </tr>
      </table>

    </form>

  </center>
</body>
</html>
